name: Sync Content Stats

on:
  push:
    branches: [main]
    paths:
      - 'public/assets/data/content.json'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger KV sync
        run: |
          curl -sf -X POST "https://amtocbot.com/api/admin/sync-content" \
            -H "Authorization: Bearer ${{ secrets.SYNC_SECRET }}" \
            -H "Content-Type: application/json"
          echo "Content stats synced to KV"
